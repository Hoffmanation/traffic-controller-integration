version: "3.9"

services:

  # Postgres
  postgres:
    image: postgres:16-alpine
    container_name: traffic_postgres
    environment:
      POSTGRES_DB: traffic_db
      POSTGRES_USER: traffic_user
      POSTGRES_PASSWORD: traffic_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traffic_user -d traffic_db"]
      interval: 5s
      timeout: 5s
      retries: 10


  # Redis
  redis:
    image: redis:7-alpine
    container_name: traffic_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Spring Boot
  app:
    build:
      context: ..
      dockerfile: .docker-compose/Dockerfile
    container_name: traffic_app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: traffic_db
      DB_USER: traffic_user
      DB_PASSWORD: traffic_pass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRINGDOC_SWAGGER_UI_ENABLED: "true"
      SPRINGDOC_API_DOCS_ENABLED: "true"
      SERVER_FORWARD_HEADERS_STRATEGY: framework
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data: