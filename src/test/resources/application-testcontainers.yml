spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/traffic_db_test
    username: traffic_user
    password: traffic_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: none

  data:
    redis:
      repositories:
        enabled: false