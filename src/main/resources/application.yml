spring:
  application:
    name: traffic-controller

  # Database Configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:traffic_db}
    username: ${DB_USER:traffic_user}
    password: ${DB_PASSWORD:traffic_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  # Migration tool
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis for caching/real-time data
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

server:
  port: 8080

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true

# actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# controllers properties
app:
  controllers:
    definitions:
      "fd132.z1.highway.a21.loc": "Berlin Alexanderplatz"
      "fd11.z1.downtown.loc": "Berlin Potsdamer Platz"
      "fd35.z1.suburb12.loc": "Berlin Spandau"
      "fd88.z2.ring-road.loc": "Berlin Mess Nord"
      "fd07.z3.airport.loc": "Berlin Brandenburg Airport, BER"
  ingestion:
    interval-ms: 2000

logging:
  level:
    com.traffic: INFO
    org.springframework.cache: TRACE
    org.springframework.data.redis: TRACE
